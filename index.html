<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北展覽導航城</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏手機橫向滾動條，讓頂部標籤滑動更流暢 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 防止手機點擊時出現藍色高亮陰影 */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-12">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-black tracking-wider text-indigo-600">
                    <i class="fa-solid fa-compass text-amber-500 animate-spin-slow mr-1"></i>雙北展覽快搜
                </h1>
                <span id="location-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">
                    <i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)
                </span>
            </div>
            
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 mask-image">
                <button onclick="filterExhibitions('all')" class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all">
                    全部展覽
                </button>
                <button onclick="filterExhibitions('near')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                    <i class="fa-solid fa-walking mr-1"></i>離我最近
                </button>
                <button onclick="filterExhibitions('rating')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                    <i class="fa-solid fa-star text-amber-400 mr-1"></i>高分好評
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-4">
        <div id="loading" class="flex flex-col items-center justify-center py-20 gap-3">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-gray-400 font-medium">正在為您計算與展覽的精準距離...</p>
        </div>

        <div id="exhibition-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            </div>
    </main>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900/90 backdrop-blur-md text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-6 border border-white/10">
        <button onclick="fetchData()" class="flex items-center gap-2 text-sm font-bold tracking-wide active:scale-95 transition-all">
            <i class="fa-solid fa-arrows-rotate text-emerald-400"></i>重新整理
        </button>
        <div class="w-px h-4 bg-white/20"></div>
        <button onclick="triggerCrawler()" class="flex items-center gap-2 text-sm font-bold tracking-wide text-indigo-300 active:scale-95 transition-all">
            <i class="fa-solid fa-spider"></i>背景爬網
        </button>
    </div>

    <script>
        // 後端 API 網址 (請填寫你部署在 Render 的網址)
        const API_BASE = "https://taipei-exhi-api.onrender.com";
        let rawData = [];
        
        // 預設經緯度 (台北車站)
        let userLat = 25.0478;
        let userLon = 121.5170;

        // 頁面加載完成後自動抓取 GPS 定位
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLon = position.coords.longitude;
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-emerald-500 mr-1"></i>已精準定位`;
                        fetchData();
                    },
                    (error) => {
                        console.log("無法獲取定位，使用預設北車位置。");
                        fetchData();
                    }
                );
            } else {
                fetchData();
            }
        };

        // 向後端請求展覽資料
        async function fetchData() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/exhibitions?lat=${userLat}&lon=${userLon}`);
                const json = await res.json();
                if (json.status === "success") {
                    rawData = json.data;
                    renderDOM(rawData);
                } else {
                    alert("後端回報錯誤: " + json.message);
                }
            } catch (err) {
                alert("無法連線至後端伺服器，請確認後端是否已啟動！");
            } finally {
                showLoading(false);
            }
        }

        // 渲染卡片到畫面上 (手機與桌機 RWD 優化核心)
        function renderDOM(data) {
            const container = document.getElementById('exhibition-list');
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 text-sm">目前沒有任何符合條件的展覽資料喔 🏖️</div>`;
                return;
            }

            data.forEach(ex => {
                // 手機版：左圖右字 (flex-row)，精簡間距與高度，大拇指滑起來極度舒適
                // 桌機版：恢復成大圖在上 (md:flex-col)，呈現完整大器感
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl border border-gray-100 p-3 shadow-xs flex flex-row md:flex-col gap-3 active:scale-[0.99] transition-all duration-200";
                
                // 處理評分顯示
                const ratingText = typeof ex.rating_avg === 'number' ? `★ ${ex.rating_avg}` : '★ 暫無評分';

                card.innerHTML = `
                    <div class="relative w-24 h-24 min-w-24 md:w-full md:h-44 bg-gray-100 rounded-xl overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1531251445707-1f000e1e87d0?w=500&auto=format&fit=crop" class="w-full h-full object-cover">
                        <span class="absolute top-1 left-1 bg-black/60 backdrop-blur-xs text-amber-400 font-black text-[10px] px-1.5 py-0.5 rounded-md">
                            ${ratingText}
                        </span>
                    </div>

                    <div class="flex flex-col justify-between flex-1 min-w-0">
                        <div>
                            <h3 class="text-base font-bold text-gray-900 truncate mb-0.5" title="${ex.title}">${ex.title}</h3>
                            <p class="text-xs text-gray-400 font-medium truncate mb-2">
                                <i class="fa-solid fa-map-pin text-gray-300 mr-1"></i>${ex.location || '雙北展覽館'}
                            </p>
                        </div>
                        
                        <div class="mt-auto">
                            <div class="flex items-center justify-between md:hidden bg-indigo-50/50 px-2 py-1 rounded-lg">
                                <span class="text-xs text-indigo-600 font-bold"><i class="fa-solid fa-car mr-1"></i>車程 ${ex.eta_car || '--'} 分鐘</span>
                                <span class="text-[11px] font-extrabold text-gray-400">⚡ 最快抵達</span>
                            </div>

                            <div class="hidden md:grid grid-cols-3 gap-1 bg-gray-50 p-2 rounded-xl text-center text-xs text-gray-500">
                                <div><i class="fa-solid fa-car text-blue-500 mb-0.5 block"></i>開車 ${ex.eta_car}分</div>
                                <div><i class="fa-solid fa-motorcycle text-amber-500 mb-0.5 block"></i>機車 ${ex.eta_moto}分</div>
                                <div><i class="fa-solid fa-train-subway text-emerald-500 mb-0.5 block"></i>捷運 ${ex.eta_transit}分</div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 快篩標籤按鈕切換邏輯
        function filterExhibitions(type) {
            // 切換按鈕亮起狀態
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all");
            event.currentTarget.className = "filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all";

            // 執行篩選排序
            let filtered = [...rawData];
            if (type === 'near') {
                // 依據車程時間由短到長排序 (離我最近)
                filtered.sort((a, b) => (a.eta_car || 999) - (b.eta_car || 999));
            } else if (type === 'rating') {
                // 依據評分高低排序
                filtered.sort((a, b) => {
                    const rA = typeof a.rating_avg === 'number' ? a.rating_avg : 0;
                    const rB = typeof b.rating_avg === 'number' ? b.rating_avg : 0;
                    return rB - rA;
                });
            }
            renderDOM(filtered);
        }

        // 觸發後端爬蟲更新資料
        async function triggerCrawler() {
            if(!confirm("確定要現在啟動雲端自動爬蟲更新資料庫嗎？")) return;
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/trigger-crawler`);
                const json = await res.json();
                alert(json.message);
                fetchData(); // 爬完自動重新抓取
            } catch (err) {
                alert("觸發爬蟲失敗，後端可能正在忙碌中。");
                showLoading(false);
            }
        }

        // 控制加載中狀態切換
        function showLoading(isLoading) {
            const loader = document.getElementById('loading');
            const list = document.getElementById('exhibition-list');
            if (isLoading) {
                loader.classList.remove('hidden');
                list.classList.add('hidden');
            } else {
                loader.classList.add('hidden');
                list.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
