<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北展覽資訊整合平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-12">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-black tracking-wider text-indigo-600">
                    <i class="fa-solid fa-compass text-amber-500 mr-1"></i>雙北展覽資訊整合平台
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="fetchData()" class="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-arrows-rotate"></i> 重新整理
                    </button>
                    <button onclick="getRandomExhibition()" class="hidden md:flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-dice animate-bounce"></i> 隨機推薦
                    </button>
                    <span id="location-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">
                        <i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>定位中...
                    </span>
                </div>
            </div>
            
            <div class="flex items-center justify-between gap-3 border-t border-gray-50 pt-1.5">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 flex-1">
                    <button onclick="filterExhibitions(this, 'all')" class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all">
                        全部展覽
                    </button>
                    <button onclick="filterExhibitions(this, 'near')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-walking mr-1"></i>離我最近
                    </button>
                    <button onclick="filterExhibitions(this, 'rating')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-star text-amber-400 mr-1"></i>高分好評
                    </button>
                </div>
                <button onclick="getRandomExhibition()" class="md:hidden flex items-center justify-center bg-amber-500 hover:bg-amber-600 text-white w-11 h-11 rounded-full shadow-md shrink-0 active:scale-90 transition-all cursor-pointer" title="隨機推薦展覽">
                    <i class="fa-solid fa-dice text-base"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        
        <div id="loading" class="flex flex-col items-center justify-center py-12 px-4 gap-4 text-center max-w-md mx-auto bg-white rounded-2xl border border-gray-100 shadow-xs my-10">
            <div id="loader-icon" class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <div class="space-y-2">
                <p id="loading-status" class="text-base font-bold text-gray-800">正在請求您的位置權限...</p>
                <p id="loading-desc" class="text-xs text-gray-500 leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                    💡 <b>為什麼需要定位權限？</b><br>
                    本平台需要存取您的 GPS 位置，以便為您即時計算從您當前所在地前往雙北各個展覽館的<b>開車、機車與捷運預估交通時間</b>。請在瀏覽器提示中點選「允許」。
                </p>
                <p id="render-tip" class="text-[11px] text-amber-600 hidden font-medium">
                    ⚠️ 偵測到雲端伺服器睡眠中，正在進行冷啟動喚醒，請稍微耐心等待約 30 秒，切勿關閉網頁...
                </p>
            </div>
        </div>

        <div id="exhibition-list" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hidden">
            </div>
    </main>

    <div id="review-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <h2 id="modal-title" class="text-lg font-bold text-gray-900 flex items-center gap-1.5 pr-4">展覽詳情</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl p-1 cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 overflow-y-auto space-y-5 flex-1">
                
                <div id="modal-info-container"></div>
                
                <hr class="border-gray-100">
                
                <div>
                    <h4 class="text-sm font-bold text-gray-500 mb-2 tracking-wide"><i class="fa-solid fa-comments mr-1 text-indigo-500"></i>大眾評價與心得</h4>
                    <div id="modal-reviews-container" class="space-y-2"></div>
                </div>
                
                <hr class="border-gray-100">
                
                <form id="review-form" onsubmit="submitReview(event)" class="space-y-3">
                    <h4 class="text-sm font-bold text-gray-500 tracking-wide"><i class="fa-solid fa-pen-to-square mr-1 text-amber-500"></i>發表您的評分與評論</h4>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1">評分星級</label>
                        <select id="form-rating" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm font-medium focus:outline-indigo-500">
                            <option value="5">⭐⭐⭐⭐⭐ 5 分 (極力推薦)</option>
                            <option value="4">⭐⭐⭐⭐ 4 分 (很不錯)</option>
                            <option value="3">⭐⭐⭐ 3 分 (普通)</option>
                            <option value="2">⭐⭐ 2 分 (有待加強)</option>
                            <option value="1">⭐ 1 分 (不推薦)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1">評論心得</label>
                        <textarea id="form-comment" rows="3" required placeholder="分享您去看展的心得與建議..." class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-xs cursor-pointer">
                        提交評論與星級
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://taipei-exhi-api.onrender.com";
        let rawData = [];
        let userLat = 25.0478; 
        let userLon = 121.5170;
        let currentActiveTitle = ""; 

        window.onload = function() {
            setTimeout(() => {
                if (rawData.length === 0) {
                    const tip = document.getElementById('render-tip');
                    if(tip) tip.classList.remove('hidden');
                    const status = document.getElementById('loading-status');
                    if(status) status.innerText = "正在連線並喚醒雲端伺服器...";
                }
            }, 3000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLon = position.coords.longitude;
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-emerald-500 mr-1"></i>已精準定位`;
                        fetchData();
                    },
                    (error) => {
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)`;
                        fetchData(); 
                    }
                );
            } else {
                document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)`;
                fetchData();
            }
        };

        async function fetchData() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/exhibitions?lat=${userLat}&lon=${userLon}`);
                const json = await res.json();
                if (json.status === "success") {
                    rawData = json.data;
                    renderDOM(rawData);
                } else {
                    showErrorState("後端錯誤: " + json.message);
                }
            } catch (err) {
                showErrorState("後端伺服器冷啟動中！正在幫您自動重試喚醒，請稍候...");
                // 觸發自動重試機制（5秒後再嘗試一次，直到醒來為止）
                setTimeout(fetchData, 5000);
            }
        }

        function showLoading(isLoading) {
            const loader = document.getElementById('loading');
            const list = document.getElementById('exhibition-list');
            const icon = document.getElementById('loader-icon');
            if (isLoading) {
                if(loader) loader.classList.remove('hidden');
                if(icon) icon.classList.add('animate-spin');
                if(list) list.classList.add('hidden');
            } else {
                if(loader) loader.classList.add('hidden');
                if(list) list.classList.remove('hidden');
            }
        }

        function showErrorState(message) {
            const status = document.getElementById('loading-status');
            const tip = document.getElementById('render-tip');
            if(status) status.innerHTML = `<span class="text
