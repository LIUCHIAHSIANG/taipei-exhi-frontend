<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北展覽資訊整合平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-24 md:pb-12">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-black tracking-wider text-indigo-600">
                    <i class="fa-solid fa-compass text-amber-500 mr-1"></i>雙北展覽資訊整合平台
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="getRandomExhibition()" class="hidden md:flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-dice animate-bounce"></i> 隨機推薦
                    </button>
                    <span id="location-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">
                        <i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)
                    </span>
                </div>
            </div>
            
            <div class="flex items-center justify-between gap-2 border-t border-gray-50 pt-1.5">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 flex-1">
                    <button onclick="filterExhibitions('all')" class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all">
                        全部展覽
                    </button>
                    <button onclick="filterExhibitions('near')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-walking mr-1"></i>離我最近
                    </button>
                    <button onclick="filterExhibitions('rating')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-star text-amber-400 mr-1"></i>高分好評
                    </button>
                </div>
                <button onclick="getRandomExhibition()" class="md:hidden flex items-center justify-center bg-amber-500 text-white w-8 h-8 rounded-full shadow-md shrink-0 active:scale-90 transition-all" title="隨機推薦">
                    <i class="fa-solid fa-dice text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div id="loading" class="flex flex-col items-center justify-center py-20 gap-3">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-gray-400 font-medium">正在為您計算與展覽的精準距離...</p>
        </div>
