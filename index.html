<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北展覽資訊整合平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-24 md:pb-12">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-black tracking-wider text-indigo-600">
                    <i class="fa-solid fa-compass text-amber-500 mr-1"></i>雙北展覽資訊整合平台
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="getRandomExhibition()" class="hidden md:flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-dice animate-bounce"></i> 隨機推薦
                    </button>
                    <span id="location-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">
                        <i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>定位中...
                    </span>
                </div>
            </div>
            
            <div class="flex items-center justify-between gap-2 border-t border-gray-50 pt-1.5">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 flex-1">
                    <button onclick="filterExhibitions(this, 'all')" class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all">
                        全部展覽
                    </button>
                    <button onclick="filterExhibitions(this, 'near')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-walking mr-1"></i>離我最近
                    </button>
                    <button onclick="filterExhibitions(this, 'rating')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-star text-amber-400 mr-1"></i>高分好評
                    </button>
                </div>
                <button onclick="getRandomExhibition()" class="md:hidden flex items-center justify-center bg-amber-500 text-white w-8 h-8 rounded-full shadow-md shrink-0 active:scale-90 transition-all" title="隨機推薦">
                    <i class="fa-solid fa-dice text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        
        <div id="loading" class="flex flex-col items-center justify-center py-16 px-4 gap-4 text-center max-w-md mx-auto bg-white rounded-2xl border border-gray-100 shadow-xs my-10">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <div class="space-y-2">
                <p class="text-base font-bold text-gray-800">正在請求您的位置權限...</p>
                <p class="text-xs text-gray-500 leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                    💡 <b>為什麼需要定位？</b><br>
                    本平台需要存取您的 GPS 位置，以便為您即時、精準地計算從您目前所在地前往雙北各個展覽館的<b>開車、機車與捷運預估時間</b>。請在瀏覽器彈出的提示中點選「允許」。
                </p>
            </div>
        </div>

        <div id="exhibition-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>
    </main>

    <div id="review-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <h2 id="modal-title" class="text-lg font-bold text-gray-900 truncate pr-4">展覽詳情</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl p-1 cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 overflow-y-auto space-y-5 flex-1">
                <div>
                    <h4 class="text-sm font-bold text-gray-500 mb-2 tracking-wide"><i class="fa-solid fa-comments mr-1 text-indigo-500"></i>大家怎麼說</h4>
                    <div id="modal-reviews-container" class="space-y-2"></div>
                </div>
                <hr class="border-gray-100">
                <form id="review-form" onsubmit="submitReview(event)" class="space-y-3">
                    <h4 class="text-sm font-bold text-gray-500 tracking-wide"><i class="fa-solid fa-pen-to-square mr-1 text-amber-500"></i>發表您的評論</h4>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1">評分星級</label>
                        <select id="form-rating" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2.5 text-sm font-medium focus:outline-indigo-500">
                            <option value="5">⭐⭐⭐⭐⭐ 5 分 (極力推薦)</option>
                            <option value="4">⭐⭐⭐⭐ 4 分 (很不錯)</option>
                            <option value="3">⭐⭐⭐ 3 分 (普通)</option>
                            <option value="2">⭐⭐ 2 分 (有待加強)</option>
                            <option value="1">⭐ 1 分 (不推薦)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1">評論心得</label>
                        <textarea id="form-comment" rows="3" required placeholder="分享您去看展的心得與建議..." class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm focus:outline-indigo-500"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm transition-all shadow-xs cursor-pointer">
                        提交評論
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900/90 backdrop-blur-md text-white px-5 py-2.5 rounded-full shadow-xl flex items-center gap-6 border border-white/10">
        <button onclick="fetchData()" class="flex items-center gap-2 text-sm font-bold tracking-wide active:scale-95 transition-all cursor-pointer">
            <i class="fa-solid fa-arrows-rotate text-emerald-400"></i>重新整理
        </button>
        <div class="w-px h-4 bg-white/20"></div>
        <button onclick="triggerCrawler()" class="flex items-center gap-2 text-sm font-bold tracking-wide text-indigo-300 active:scale-95 transition-all cursor-pointer">
            <i class="fa-solid fa-spider"></i>背景爬網
        </button>
    </div>

    <script>
        const API_BASE = "https://taipei-exhi-api.onrender.com";
        let rawData = [];
        let userLat = 25.0478; // 預設台北車站
        let userLon = 121.5170;
        let currentActiveTitle = ""; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLon = position.coords.longitude;
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-emerald-500 mr-1"></i>已精準定位`;
                        fetchData();
                    },
                    (error) => {
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)`;
                        fetchData(); 
                    }
                );
            } else {
                document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>台北車站 (預設)`;
                fetchData();
            }
        };

        async function fetchData() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/exhibitions?lat=${userLat}&lon=${userLon}`);
                const json = await res.json();
                if (json.status === "success") {
                    rawData = json.data;
                    renderDOM(rawData);
                } else {
                    alert("後端錯誤: " + json.message);
                }
            } catch (err) {
                alert("無法連線至後端伺服器！");
            } finally {
                showLoading(false);
            }
        }

        function renderDOM(data) {
            const container = document.getElementById('exhibition-list');
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 text-sm">目前沒有展覽資料喔 🏖️</div>`;
                return;
            }

            data.forEach((ex) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl md:rounded-2xl border border-gray-100 p-3 md:p-5 shadow-sm flex flex-row md:flex-col gap-4 hover:shadow-md transition-all duration-300";
                
                const ratingText = typeof ex.rating_avg === 'number' ? `★ ${ex.rating_avg}` : '★ 暫無評分';

                // 💡 終極修復：不再在 HTML 屬性裡塞複雜字串，直接用 HTML5 data 屬性存入展覽名稱
                card.innerHTML = `
                    <div class="relative w-24 h-24 min-w-24 md:w-full md:h-48 bg-gray-100 rounded-lg md:rounded-xl overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1531251445707-1f000e1e87d0?w=500&auto=format&fit=crop" class="w-full h-full object-cover">
                        <span class="absolute top-2 left-2 bg-black/60 backdrop-blur-xs text-amber-400 font-black text-[10px] md:text-xs px-2 py-0.5 rounded-md">
                            ${ratingText}
                        </span>
                    </div>

                    <div class="flex flex-col justify-between flex-1 min-w-0">
                        <div>
                            <h3 class="text-base md:text-xl font-bold text-gray-900 truncate mb-1" title="${ex.title}">${ex.title}</h3>
                            <p class="text-xs md:text-sm text-gray-400 font-medium truncate mb-2">
                                <i class="fa-solid fa-map-pin text-rose-400 mr-1"></i>${ex.location || '雙北展覽館'}
                            </p>
                        </div>
                        
                        <div class="mt-auto space-y-2">
                            <div class="flex items-center justify-between md:hidden gap-2">
                                <div class="bg-indigo-50/60 px-2 py-1.5 rounded-lg flex-1 text-xs text-indigo-600 font-bold">
                                    <i class="fa-solid fa-car mr-1"></i>車程 ${ex.eta_car || '--'} 分鐘
                                </div>
                                <button onclick="openModalByElement(this)" data-title="${ex.title}" class="bg-gray-900 text-white text-xs font-bold px-3 py-1.5 rounded-lg shrink-0 cursor-pointer">
                                    <i class="fa-regular fa-comment-dots mr-1"></i>評論 (${(ex.reviews || []).length})
                                </button>
                            </div>

                            <div class="hidden md:grid grid-cols-3 gap-2 bg-gray-50 p-3 rounded-xl text-center text-xs text-gray-600">
                                <div class="border-r border-gray-200/60"><i class="fa-solid fa-car text-blue-500 mb-1 block text-sm"></i>開車<br><span class="font-bold text-gray-900">${ex.eta_car}分</span></div>
                                <div class="border-r border-gray-200/60"><i class="fa-solid fa-motorcycle text-amber-500 mb-1 block text-sm"></i>機車<br><span class="font-bold text-gray-900">${ex.eta_moto}分</span></div>
                                <div><i class="fa-solid fa-train-subway text-emerald-500 mb-1 block text-sm"></i>捷運<br><span class="font-bold text-gray-900">${ex.eta_transit}分</span></div>
                            </div>

                            <button onclick="openModalByElement(this)" data-title="${ex.title}" class="hidden md:block w-full text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-xs py-2 rounded-xl transition-all cursor-pointer">
                                <i class="fa-regular fa-comment-dots mr-1"></i>查看與發表評論 (${(ex.reviews || []).length})
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 🎲 核心修復：不論手機或電腦，點擊隨機推薦都能完美呼叫
        function getRandomExhibition() {
            if (rawData.length === 0) {
                alert("目前沒有展覽資料可以推薦喔！");
                return;
            }
            const randomIndex = Math.floor(Math.random() * rawData.length);
            const target = rawData[randomIndex];
            openModalByName(target.title);
        }

        // 📥 核心修復：透過按鈕上的 data-title 屬性開啟視窗，完美避開引號衝突 Bug
        function openModalByElement(button) {
            const title = button.getAttribute('data-title');
            openModalByName(title);
        }

        // 渲染 Modal 的共用底層核心
        function openModalByName(title) {
            const target = rawData.find(item => item.title === title);
            if (!target) return;

            currentActiveTitle = title;
            document.getElementById('modal-title').innerText = title;
            
            const reviews = target.reviews || [];
            const reviewsContainer = document.getElementById('modal-reviews-container');
            reviewsContainer.innerHTML = "";

            if (reviews.length === 0) {
                reviewsContainer.innerHTML = `<p class="text-xs text-gray-400 italic py-2">目前還沒有人留下心得，快來當第一個吧！</p>`;
            } else {
                reviews.forEach(r => {
                    const rDiv = document.createElement('div');
                    rDiv.className = "bg-gray-50 p-3 rounded-xl text-sm";
                    if (typeof r === 'object' && r !== null) {
                        const stars = '⭐'.repeat(r.rating || 5);
                        rDiv.innerHTML = `<div class="text-xs text-amber-500 font-bold mb-0.5">${stars}</div><div class="text-gray-700">${r.comment || ''}</div>`;
                    } else {
                        rDiv.innerHTML = `<div class="text-gray-700">${r}</div>`;
                    }
                    reviewsContainer.appendChild(rDiv);
                });
            }

            document.getElementById('review-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('review-modal').classList.add('hidden');
            document.getElementById('review-form').reset();
        }

        async function submitReview(event) {
            event.preventDefault();
            const rating = parseInt(document.getElementById('form-rating').value);
            const comment = document.getElementById('form-comment').value;

            try {
                const res = await fetch(`${API_BASE}/api/review`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        title: currentActiveTitle,
                        rating: rating,
                        comment: comment
                    })
                });
                const json = await res.json();
                if (json.status === "success") {
                    alert("評論發表成功！");
                    closeModal();
                    fetchData(); 
                } else {
                    alert("發表失敗: " + json.message);
                }
            } catch (err) {
                alert("連線後端失敗，無法儲存評論。");
            }
        }

        // 核心修復：傳入 btn 元素，徹底解決手機端標籤切換無反應的 Bug
        function filterExhibitions(btnElement, type) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all");
            btnElement.className = "filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all";

            let filtered = [...rawData];
            if (type === 'near') {
                filtered.sort((a, b) => (a.eta_car || 999) - (b.eta_car || 999));
            } else if (type === 'rating') {
                filtered.sort((a, b) => (typeof b.rating_avg === 'number' ? b.rating_avg : 0) - (typeof a.rating_avg === 'number' ? a.rating_avg : 0));
            }
            renderDOM(filtered);
        }

        async function triggerCrawler() {
            if(!confirm("確定要現在啟動雲端自動爬蟲更新資料庫嗎？")) return;
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/trigger-crawler`);
                const json = await res.json();
                alert(json.message);
                fetchData();
            } catch (err) {
                alert("觸發爬蟲失敗。");
                showLoading(false);
            }
        }

        function showLoading(isLoading) {
            const loader = document.getElementById('loading');
            const list = document.getElementById('exhibition-list');
            if (isLoading) {
                loader.classList.remove('hidden');
                list.classList.add('hidden');
            } else {
                loader.classList.add('hidden');
                list.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
