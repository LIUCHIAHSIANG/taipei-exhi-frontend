<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北展覽資訊整合平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        * { -webkit-tap-highlight-color: transparent; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-12">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-black tracking-wider text-indigo-600">
                    <i class="fa-solid fa-compass text-amber-500 mr-1"></i>雙北展覽資訊整合平台
                </h1>
                <div class="flex items-center gap-2">
                    <button onclick="fetchData()" class="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-arrows-rotate"></i> 重新整理
                    </button>
                    <button onclick="getRandomExhibition()" class="hidden md:flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-dice animate-bounce"></i> 隨機推薦
                    </button>
                    <span id="location-badge" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-medium">
                        <i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>定位中...
                    </span>
                </div>
            </div>
            
            <div class="flex items-center justify-between gap-3 border-t border-gray-50 pt-1.5">
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 flex-1">
                    <button onclick="filterExhibitions(this, 'all')" class="filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all">
                        全部展覽
                    </button>
                    <button onclick="filterExhibitions(this, 'near')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-walking mr-1"></i>離我最近
                    </button>
                    <button onclick="filterExhibitions(this, 'rating')" class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all">
                        <i class="fa-solid fa-star text-amber-400 mr-1"></i>高分好評
                    </button>
                </div>
                <button onclick="getRandomExhibition()" class="md:hidden flex items-center justify-center bg-amber-500 hover:bg-amber-600 text-white w-11 h-11 rounded-full shadow-md shrink-0 active:scale-90 transition-all cursor-pointer">
                    <i class="fa-solid fa-dice text-base"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        
        <div id="loading" class="flex flex-col items-center justify-center py-12 px-4 gap-4 text-center max-w-md mx-auto bg-white rounded-2xl border border-gray-100 shadow-xs my-10">
            <div id="loader-icon" class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <div class="space-y-2">
                <p id="loading-status" class="text-base font-bold text-gray-800">正在請求您的位置權限...</p>
                <p id="loading-desc" class="text-xs text-gray-500 leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                    若無跳出提示或等待過久，系統將在 <span id="countdown" class="text-amber-600 font-bold">5</span> 秒後自動以<span class="font-bold text-gray-800">台北車站</span>為起點進入畫面。
                </p>
                <p id="render-tip" class="text-[11px] text-amber-600 hidden font-medium">
                    ⚠️ 偵測到雲端伺服器睡眠中，正在進行冷啟動喚醒，請耐心等待...
                </p>
            </div>
        </div>

        <div id="exhibition-list" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hidden">
            </div>
    </main>

    <div id="review-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            
            <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <h2 id="modal-title" class="text-lg font-bold text-gray-900 flex items-center gap-1.5 pr-4">展覽資訊</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl p-1 cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="flex border-b border-gray-100 bg-white">
                <button onclick="switchTab('details')" id="tab-btn-details" class="flex-1 py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition-all">
                    <i class="fa-solid fa-circle-info mr-1"></i>展覽詳情
                </button>
                <button onclick="switchTab('reviews')" id="tab-btn-reviews" class="flex-1 py-3 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all">
                    <i class="fa-solid fa-comments mr-1"></i>評價與心得
                </button>
            </div>

            <div class="p-5 overflow-y-auto flex-1 bg-gray-50/50">
                
                <div id="tab-content-details" class="tab-content active space-y-4">
                    <div id="modal-info-container"></div>
                </div>
                
                <div id="tab-content-reviews" class="tab-content space-y-5">
                    <div>
                        <h4 class="text-sm font-bold text-gray-500 mb-2"><i class="fa-solid fa-star text-amber-500 mr-1"></i>大家怎麼說</h4>
                        <div id="modal-reviews-container" class="space-y-2"></div>
                    </div>
                    <hr class="border-gray-200">
                    <form id="review-form" onsubmit="submitReview(event)" class="space-y-3 bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                        <h4 class="text-sm font-bold text-gray-700"><i class="fa-solid fa-pen-to-square mr-1 text-indigo-500"></i>發表您的評論</h4>
                        <div>
                            <label class="block text-xs text-gray-400 font-bold mb-1">給予評分</label>
                            <select id="form-rating" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-sm font-medium focus:outline-indigo-500">
                                <option value="5">⭐⭐⭐⭐⭐ 5 分 (極力推薦)</option>
                                <option value="4">⭐⭐⭐⭐ 4 分 (很不錯)</option>
                                <option value="3">⭐⭐⭐ 3 分 (普通)</option>
                                <option value="2">⭐⭐ 2 分 (有待加強)</option>
                                <option value="1">⭐ 1 分 (不推薦)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-bold mb-1">撰寫心得</label>
                            <textarea id="form-comment" rows="3" required placeholder="分享您去看展的心得與建議..." class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm focus:outline-indigo-500"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-xs cursor-pointer">
                            提交評論
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://taipei-exhi-api.onrender.com";
        let rawData = [];
        
        // 預設經緯度：台北車站
        let userLat = 25.0478; 
        let userLon = 121.5170;
        
        let currentActiveTitle = ""; 
        let fetchRetryCount = 0;
        const MAX_RETRIES = 2;
        let locationResolved = false;

        window.onload = function() {
            let secondsLeft = 5;
            const countdownEl = document.getElementById('countdown');
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                if(countdownEl) countdownEl.innerText = secondsLeft;
            }, 1000);

            const fallbackTimer = setTimeout(() => {
                if (!locationResolved) {
                    locationResolved = true;
                    clearInterval(countdownInterval);
                    document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>定位超時 (預設台北車站)`;
                    fetchData(); 
                }
            }, 5000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        if (locationResolved) return;
                        locationResolved = true;
                        clearTimeout(fallbackTimer);
                        clearInterval(countdownInterval);
                        userLat = position.coords.latitude;
                        userLon = position.coords.longitude;
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-emerald-500 mr-1"></i>已精準定位`;
                        fetchData();
                    },
                    (error) => {
                        if (locationResolved) return;
                        locationResolved = true;
                        clearTimeout(fallbackTimer);
                        clearInterval(countdownInterval);
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>無法定位 (預設台北車站)`;
                        fetchData(); 
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                if (locationResolved) return;
                locationResolved = true;
                clearTimeout(fallbackTimer);
                clearInterval(countdownInterval);
                document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot text-rose-500 mr-1"></i>不支援定位 (預設台北車站)`;
                fetchData();
            }
        };

        async function fetchData() {
            showLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/exhibitions?lat=${userLat}&lon=${userLon}`);
                const json = await res.json();
                
                if (json.status === "success" && json.data) {
                    rawData = json.data;

                    // 🎯 自動攔截：只要偵測到測試展覽，前端直接強制改寫地點與地址為「南港展覽館」
                    rawData.forEach(ex => {
                        if (ex.title.includes("自動化測試展覽") || ex.location === "雲端測試展館") {
                            ex.location = "台北南港展覽館1館";
                            ex.address = "115台北市南港區經貿二路1號";
                        }
                    });

                    renderDOM(rawData);
                    showLoading(false); 
                    fetchRetryCount = 0; 
                } else {
                    throw new Error(json.message || "資料格式不符");
                }
            } catch (err) {
                if (fetchRetryCount < MAX_RETRIES) {
                    fetchRetryCount++;
                    const tip = document.getElementById('render-tip');
                    if(tip) tip.classList.remove('hidden');
                    const status = document.getElementById('loading-status');
                    if(status) status.innerHTML = `<span class="text-amber-500">正在等待伺服器喚醒 (第 ${fetchRetryCount} 次重試)...</span>`;
                    setTimeout(fetchData, 4000);
                } else {
                    document.getElementById('loading-status').innerHTML = `<span class="text-rose-500">伺服器無回應，已切換至「離線測試模式」</span>`;
                    loadMockData();
                }
            }
        }

        function loadMockData() {
            rawData = [
                {
                    title: "[⏱️ 自動化測試展覽 ]", 
                    location: "台北南港展覽館1館",
                    address: "115台北市南港區經貿二路1號",
                    description: "此為後端 API 無法連線時自動啟用的測試資料。確保前端排版與導航功能皆可正常運作。",
                    eta_car: 5, eta_moto: 3, eta_transit: 5, rating_avg: 5.0,
                    reviews: [{ rating: 5, comment: "前端切版與自動導航測試正常！" }]
                }
            ];
            renderDOM(rawData);
            showLoading(false);
        }

        function showLoading(isLoading) {
            const loader = document.getElementById('loading');
            const list = document.getElementById('exhibition-list');
            const icon = document.getElementById('loader-icon');
            if (isLoading) {
                if(loader) loader.classList.remove('hidden');
                if(icon) icon.classList.add('animate-spin');
                if(list) list.classList.add('hidden');
            } else {
                if(loader) loader.classList.add('hidden');
                if(icon) icon.classList.remove('animate-spin');
                if(list) list.classList.remove('hidden');
            }
        }

        function renderDOM(data) {
            const container = document.getElementById('exhibition-list');
            container.innerHTML = "";

            if(data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400 text-sm">目前沒有展覽資料喔 🏖️</div>`;
                return;
            }

            data.forEach((ex, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl border border-gray-100 p-4 shadow-sm flex flex-col sm:flex-row gap-4 hover:shadow-md transition-all duration-300 items-start";
                
                const ratingText = typeof ex.rating_avg === 'number' ? `★ ${ex.rating_avg.toFixed(1)}` : '★ 暫無評分';
                
                // Google Maps 官方標準導航 URL
                const destination = encodeURIComponent(ex.address || ex.location || ex.title);
                const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destination}`;

                card.innerHTML = `
                    <div class="relative w-full h-36 sm:w-32 sm:h-32 sm:min-w-32 md:w-36 md:h-36 md:min-w-36 bg-gray-100 rounded-xl overflow-hidden shrink-0 self-center">
                        <img src="https://images.unsplash.com/photo-1531251445707-1f000e1e87d0?w=500&auto=format&fit=crop" class="w-full h-full object-cover">
                        <span class="absolute top-2 left-2 bg-black/60 backdrop-blur-xs text-amber-400 font-black text-xs px-2 py-0.5 rounded-sm">
                            ${ratingText}
                        </span>
                    </div>

                    <div class="flex flex-col justify-between flex-1 min-w-0 w-full h-full">
                        <div>
                            <h3 class="text-base md:text-lg font-bold text-gray-900 truncate mb-1" title="${ex.title}">${ex.title}</h3>
                            <p class="text-xs text-gray-400 font-medium truncate mb-0.5">
                                <i class="fa-solid fa-building text-indigo-400 mr-1"></i>${ex.location || '雙北展覽館'}
                            </p>
                            <p class="text-xs text-gray-400 font-medium truncate mb-2">
                                <i class="fa-solid fa-map-pin text-rose-400 mr-1"></i>${ex.address || ex.location || '暫無地址'}
                            </p>
                        </div>
                        
                        <div class="space-y-2 mt-auto">
                            <div class="grid grid-cols-3 gap-1 bg-gray-50 p-1.5 rounded-lg text-center text-xs text-gray-600">
                                <div><i class="fa-solid fa-car text-blue-500 mr-0.5"></i>開車<br><span class="font-bold text-gray-900">${ex.eta_car || '--'}分</span></div>
                                <div class="border-x border-gray-200/60"><i class="fa-solid fa-motorcycle text-amber-500 mr-0.5"></i>機車<br><span class="font-bold text-gray-900">${ex.eta_moto || '--'}分</span></div>
                                <div><i class="fa-solid fa-bus text-emerald-500 mr-0.5"></i>大眾運輸<br><span class="font-bold text-gray-900">${ex.eta_transit || '--'}分</span></div>
                            </div>

                            <div class="flex gap-1.5">
                                <button onclick="openModalByIndex(${index}, 'details')" class="flex-1 text-center bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold text-xs py-2 rounded-lg transition-all cursor-pointer">
                                    <i class="fa-solid fa-circle-info mr-0.5"></i>詳情
                                </button>
                                <button onclick="openModalByIndex(${index}, 'reviews')" class="flex-1 text-center bg-amber-50 hover:bg-amber-100 text-amber-600 font-bold text-xs py-2 rounded-lg transition-all cursor-pointer">
                                    <i class="fa-solid fa-comments mr-0.5"></i>評論 (${(ex.reviews || []).length})
                                </button>
                                <a href="${mapUrl}" target="_blank" class="bg-rose-500 hover:bg-rose-600 text-white font-bold text-xs px-3 py-2 rounded-lg text-center flex items-center justify-center gap-0.5 cursor-pointer">
                                    <i class="fa-solid fa-location-arrow"></i>導航
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getRandomExhibition() {
            if (rawData.length === 0) {
                alert("目前沒有展覽資料可以抽取喔！");
                return;
            }
            const randomIndex = Math.floor(Math.random() * rawData.length);
            openModalDetails(randomIndex, true, 'details'); 
        }

        function openModalByIndex(index, targetTab = 'details') {
            openModalDetails(index, false, targetTab);
        }

        function openModalDetails(index, isRandom = false, targetTab = 'details') {
            const target = rawData[index];
            if (!target) return;

            currentActiveTitle = target.title;
            
            document.getElementById('modal-title').innerHTML = isRandom 
                ? `<i class="fa-solid fa-dice text-amber-500 mr-1 animate-bounce"></i> 這次推薦你看看這個展覽喔!` 
                : `<i class="fa-solid fa-layer-group text-indigo-500 mr-1"></i> 展覽總覽`;

            const destination = encodeURIComponent(target.address || target.location || target.title);
            const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destination}`;
            
            document.getElementById('modal-info-container').innerHTML = `
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-4">
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <h3 class="text-base font-bold text-gray-900 leading-tight">${target.title}</h3>
                            <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-building text-indigo-400 mr-1"></i>${target.location || '雙北展覽館'}</p>
                            <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-map-pin text-rose-500 mr-1"></i>${target.address || target.location || '暫無地址'}</p>
                        </div>
                        <span class="bg-amber-400 text-gray-900 font-black text-xs px-2 py-1 rounded-md shrink-0">
                            ★ ${(typeof target.rating_avg === 'number' ? target.rating_avg : 0).toFixed(1)}
                        </span>
                    </div>
                    
                    <div class="text-sm text-gray-600 leading-relaxed bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <b class="text-gray-800 block mb-1">📝 展覽介紹：</b>
                        ${target.description || '本展覽為當季雙北熱門亮點，現場展出豐富作品與互動裝置，非常適合安排行程前往探索，體驗藝文與知性之美。'}
                    </div>

                    <a href="${mapUrl}" target="_blank" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-2.5 rounded-lg text-sm text-center flex items-center justify-center gap-1 transition-all shadow-xs cursor-pointer">
                        <i class="fa-solid fa-location-arrow animate-pulse"></i> 開始 Google Maps 地圖導航
                    </a>
                </div>
            `;

            const reviews = target.reviews || [];
            const reviewsContainer = document.getElementById('modal-reviews-container');
            reviewsContainer.innerHTML = "";

            if (reviews.length === 0) {
                reviewsContainer.innerHTML = `<p class="text-xs text-gray-400 italic py-3 text-center bg-white rounded-lg border border-gray-100">目前此展覽還沒有大眾點評，快來發表第一個評分吧！</p>`;
            } else {
                reviews.forEach(r => {
                    const rDiv = document.createElement('div');
                    rDiv.className = "bg-white p-3 rounded-xl text-sm border border-gray-100 shadow-sm";
                    if (typeof r === 'object' && r !== null) {
                        const stars = '⭐'.repeat(r.rating || 5);
                        rDiv.innerHTML = `<div class="text-[10px] text-amber-500 font-bold mb-1">${stars}</div><div class="text-gray-700 font-medium">${r.comment || ''}</div>`;
                    } else {
                        rDiv.innerHTML = `<div class="text-gray-700 font-medium">${r}</div>`;
                    }
                    reviewsContainer.appendChild(rDiv);
                });
            }

            switchTab(targetTab);

            const modalBody = document.querySelector('#review-modal .overflow-y-auto');
            if (modalBody) modalBody.scrollTop = 0;

            document.getElementById('review-modal').classList.remove('hidden');
        }

        // 切換分頁
        function switchTab(tabId) {
            document.getElementById('tab-btn-details').className = (tabId === 'details') 
                ? "flex-1 py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 transition-all bg-indigo-50/30"
                : "flex-1 py-3 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all cursor-pointer";
            
            document.getElementById('tab-btn-reviews').className = (tabId === 'reviews') 
                ? "flex-1 py-3 text-sm font-bold text-amber-600 border-b-2 border-amber-500 transition-all bg-amber-50/30"
                : "flex-1 py-3 text-sm font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-all cursor-pointer";

            document.getElementById('tab-content-details').classList.toggle('active', tabId === 'details');
            document.getElementById('tab-content-reviews').classList.toggle('active', tabId === 'reviews');
        }

        style="cursor:pointer;"
        function closeModal() {
            document.getElementById('review-modal').classList.add('hidden');
            document.getElementById('review-form').reset();
        }

        async function submitReview(event) {
            event.preventDefault();
            const rating = parseInt(document.getElementById('form-rating').value);
            const comment = document.getElementById('form-comment').value;

            try {
                const res = await fetch(`${API_BASE}/api/review`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title: currentActiveTitle, rating: rating, comment: comment })
                });
                const json = await res.json();
                if (json.status === "success") {
                    alert("評論與評分發表成功！");
                    closeModal();
                    fetchData(); 
                } else {
                    alert("發表失敗: " + json.message);
                }
            } catch (err) {
                alert("連線後端失敗，無法儲存評論。如果是測試資料模式將無法儲存。");
            }
        }

        function filterExhibitions(btnElement, type) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 transition-all");
            btnElement.className = "filter-btn active whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white shadow-xs transition-all";

            let filtered = [...rawData];
            if (type === 'near') {
                filtered.sort((a, b) => (a.eta_car || 999) - (b.eta_car || 999));
            } else if (type === 'rating') {
                filtered.sort((a, b) => (typeof b.rating_avg === 'number' ? b.rating_avg : 0) - (typeof a.rating_avg === 'number' ? a.rating_avg : 0));
            }
            renderDOM(filtered);
        }
    </script>
</body>
